name: Tests
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12", "3.13" ]
      fail-fast: false
    services:
     postgres:
       image: postgres:18
       env:
         POSTGRES_USER: taskiq-django
         POSTGRES_PASSWORD: look_in_vault
         POSTGRES_DB: taskiq-django
       options: >-
         --health-cmd pg_isready
         --health-interval 10s
         --health-timeout 5s
         --health-retries 5
       ports:
         - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: setup-uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}
          version: "latest"
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: uv sync --all-extras
      - name: Run tests
        env:
          TASKIQ_DJANGO__POSTGRES__DSN: postgresql+asyncpg://taskiq-django:look_in_vault@localhost:5432/taskiq-django
        run: uv run pytest
      - name: Check dead fixtures
        run: uv run pytest --dead-fixtures
